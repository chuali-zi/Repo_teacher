<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<meta name="color-scheme" content="dark" />
<meta name="rt-api-base" content="" />
<title>Repo Tutor · 阅读间 [PIXEL · v3]</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=DotGothic16&family=Share+Tech+Mono&family=Press+Start+2P&display=swap" rel="stylesheet" />
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" crossorigin="anonymous"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
html,body{height:100%;background:#020A12;color:#A0EED8;
  font-family:"DotGothic16","Share Tech Mono",monospace;
  font-size:14px;
  -webkit-font-smoothing:none;
  image-rendering:pixelated;}
body{overflow:hidden;}

/* CRT scanlines */
body::after{
  content:'';
  position:fixed;inset:0;
  pointer-events:none;z-index:9999;
  background:repeating-linear-gradient(
    0deg,
    rgba(0,0,0,0.18) 0px,
    rgba(0,0,0,0.18) 1px,
    transparent 1px,
    transparent 3px
  );
}

/* pixel scrollbar */
::-webkit-scrollbar{width:8px;height:8px;}
::-webkit-scrollbar-track{background:#020A12;border-left:1px solid #0A3050;}
::-webkit-scrollbar-thumb{background:#0A5070;border:1px solid #0D7090;}
::-webkit-scrollbar-thumb:hover{background:#00A880;}
::selection{background:rgba(0,229,176,0.25);color:#00FFD0;}

@keyframes blink{0%,49%{opacity:1;}50%,100%{opacity:0;}}
@keyframes scanRun{from{background-position:0 0;}to{background-position:0 100%;}}
@keyframes glow{0%,100%{text-shadow:0 0 6px #00E5B0,0 0 2px #00E5B0;}50%{text-shadow:0 0 14px #00FFD0,0 0 4px #00FFD0;}}
@keyframes fadeUp{from{opacity:0;transform:translateY(6px);}to{opacity:1;transform:translateY(0);}}
@keyframes pulse{0%{box-shadow:0 0 0 0 rgba(0,229,176,0.5);}70%{box-shadow:0 0 0 8px rgba(0,229,176,0);}100%{box-shadow:0 0 0 0 rgba(0,229,176,0);}}
@keyframes march{0%{background-position:0 0;}100%{background-position:16px 0;}}
@keyframes spin{to{transform:rotate(360deg);}}

.blink{animation:blink 1s step-end infinite;}
.fade-up{animation:fadeUp 280ms ease both;}
.glow-text{animation:glow 2s ease-in-out infinite;}

.march{
  background-image:repeating-linear-gradient(90deg,#00E5B0 0,#00E5B0 6px,transparent 6px,transparent 12px);
  background-size:16px 1px;
  background-position:0 bottom;
  background-repeat:repeat-x;
  animation:march 0.6s linear infinite;
}
</style>
</head>
<body>
<div id="root"></div>

<script>
const TWEAK_DEFAULTS = {
  "theme": "teal",
  "showLeftPanel": true,
  "showRightPanel": true,
  "scanlines": false,
  "glowIntensity": "medium"
};

// ── API base resolution ──────────────────────────────────────
const API_BASE = (function(){
  const meta = document.querySelector('meta[name="rt-api-base"]');
  if (meta && meta.content) return meta.content.replace(/\/+$/, "");
  const host = location.hostname || "127.0.0.1";
  return "http://" + host + ":8000";
})();

// ── step label map (backend ProgressStepKey → UI label) ──────
const STEP_LABELS = {
  repo_access:             "REPO ACCESS",
  file_tree_scan:          "FILE TREE SCAN",
  research_planning:       "RESEARCH PLANNING",
  source_sweep:            "SOURCE SWEEP",
  chapter_synthesis:       "CHAPTER SYNTHESIS",
  final_report_write:      "FINAL REPORT WRITE",
  entry_and_module_analysis:"ENTRY DETECTION",
  dependency_analysis:     "DEP ANALYSIS",
  skeleton_assembly:       "SKELETON BUILD",
  initial_report_generation:"REPORT GEN",
};

const QUICK_GUIDE_STEPS = [
  "repo_access","file_tree_scan","entry_and_module_analysis",
  "dependency_analysis","skeleton_assembly","initial_report_generation"
];
const DEEP_RESEARCH_STEPS = [
  "repo_access","file_tree_scan","research_planning",
  "source_sweep","chapter_synthesis","final_report_write"
];

// ── view / status mapping (backend ClientView → UI view) ─────
const VIEW_MAP = { input:"input", analysis:"analyzing", chat:"chatting" };
</script>

<script type="text/babel">
const {useState,useEffect,useRef,useCallback} = React;

// ── Pixel design tokens ──────────────────────────────────────
const C={
  bg:'#020A12', bgP:'#030E1A', bgE:'#051828', bgR:'#071F34', bgD:'#010508',
  bdr:'#0A3250', bdrS:'#083048', bdrX:'#0D5070', bdrA:'#00604A',
  ink:'#A0EED8', inkS:'#70C8B0', inkM:'#408A72', inkD:'#1E4838', inkF:'#0E2820',
  teal:'#00E5B0', tealB:'#00FFD0', tealD:'#009870',
  tealG:'rgba(0,229,176,0.12)', tealV:'rgba(0,229,176,0.06)',
  blue:'#0099EE', blueB:'#22CCFF', blueD:'#006699',
  blueG:'rgba(0,153,238,0.12)',
  rust:'#FF4466', ivy:'#00CC88', plum:'#9966FF', amber:'#FFAA00',
};

const FF={
  px:'"Press Start 2P",monospace',
  dot:'"DotGothic16","Share Tech Mono",monospace',
  mono:'"Share Tech Mono","JetBrains Mono",monospace',
};

const glow=(col=C.teal,r=8)=>`0 0 ${r}px ${col},0 0 ${Math.round(r/3)}px ${col}`;
const textGlow=(col=C.teal)=>`0 0 8px ${col},0 0 2px ${col}`;

// ── debug log helper ─────────────────────────────────────────
let _dbId=0;
const mkLog=(level,src,msg)=>({id:++_dbId,level,src,msg,
  t:new Date().toLocaleTimeString('zh',{hour:'2-digit',minute:'2-digit',second:'2-digit'})});

// ── API wrapper ──────────────────────────────────────────────
async function apiRequest(method, path, { body, sessionId } = {}) {
  const headers = { Accept: "application/json" };
  if (body !== undefined) headers["Content-Type"] = "application/json";
  if (sessionId) headers["X-Session-Id"] = sessionId;
  const resp = await fetch(API_BASE + path, {
    method,
    headers,
    body: body !== undefined ? JSON.stringify(body) : undefined,
    mode: "cors",
  });
  let payload = null;
  try { payload = await resp.json(); } catch (_) { /* ignore */ }
  if (!resp.ok || (payload && payload.ok === false)) {
    const failure = (payload && payload.error) || {
      error_code: "unknown",
      message: "HTTP " + resp.status,
      retryable: false,
      stage: "idle",
      input_preserved: true,
    };
    const err = new Error(failure.message);
    err.payload = failure;
    err.status = resp.status;
    throw err;
  }
  return payload;
}

const api = {
  submitRepo: (inputValue, analysisMode="quick_guide") =>
    apiRequest("POST", "/api/repo", { body:{ input_value:inputValue, analysis_mode:analysisMode } }),
  validateRepo: (inputValue) =>
    apiRequest("POST", "/api/repo/validate", { body:{ input_value:inputValue } }),
  getSession: (sessionId) =>
    apiRequest("GET", "/api/session", { sessionId: sessionId || undefined }),
  clearSession: (sessionId) =>
    apiRequest("DELETE", "/api/session", { sessionId }),
  sendMessage: (sessionId, message) =>
    apiRequest("POST", "/api/chat", { body:{ message }, sessionId }),
  explainSidecar: (question) =>
    apiRequest("POST", "/api/sidecar/explain", { body:{ question } }),
};

function openStream(kind, sessionId, onEvent, onClose) {
  const path = kind === "analysis" ? "/api/analysis/stream" : "/api/chat/stream";
  const url = API_BASE + path + "?session_id=" + encodeURIComponent(sessionId);
  const source = new EventSource(url);
  const names = [
    "status_changed","analysis_progress","degradation_notice","agent_activity",
    "answer_stream_start","answer_stream_delta","answer_stream_end",
    "message_completed","error",
  ];
  const handlers = names.map(name => {
    const fn = (ev) => {
      if (!ev.data) return;
      try { onEvent(name, JSON.parse(ev.data)); }
      catch (_) { /* ignore parse errors */ }
    };
    source.addEventListener(name, fn);
    return [name, fn];
  });
  source.onerror = () => {
    if (onClose) onClose(source.readyState);
  };
  return () => {
    for (const [n,f] of handlers) source.removeEventListener(n, f);
    source.close();
  };
}

// ── Pixel Box component ──────────────────────────────────────
const PxBox=({children,accent=false,glow:g=false,style={},...rest})=>(
  <div style={{
    border:`1px solid ${accent?C.teal:C.bdrX}`,
    background:accent?C.tealV:C.bgE,
    boxShadow:g?`0 0 12px ${C.tealG},inset 0 0 8px ${C.tealV}`:'none',
    position:'relative',
    ...style
  }} {...rest}>
    <div style={{position:'absolute',top:-1,left:-1,width:4,height:4,background:accent?C.teal:C.bdrX}}/>
    <div style={{position:'absolute',top:-1,right:-1,width:4,height:4,background:accent?C.teal:C.bdrX}}/>
    <div style={{position:'absolute',bottom:-1,left:-1,width:4,height:4,background:accent?C.teal:C.bdrX}}/>
    <div style={{position:'absolute',bottom:-1,right:-1,width:4,height:4,background:accent?C.teal:C.bdrX}}/>
    {children}
  </div>
);

const PxLabel=({children,color=C.inkM,style={}})=>(
  <span style={{fontFamily:FF.mono,fontSize:9,letterSpacing:'0.2em',textTransform:'uppercase',color,...style}}>
    {children}
  </span>
);

// ── Step row ─────────────────────────────────────────────────
const StepRow=({step})=>{
  const st = step.step_state || 'pending';
  const stateSymbol={pending:'[ ]',running:'[>]',done:'[✓]',error:'[!]'};
  const stateColor={pending:C.inkD,running:C.teal,done:C.ivy,error:C.rust};
  const label = STEP_LABELS[step.step_key] || (step.step_key || '').toUpperCase();
  return (
    <div style={{display:'flex',gap:10,alignItems:'center',padding:'5px 8px',
      background:st==='running'?C.tealV:'transparent',
      borderLeft:`2px solid ${st==='running'?C.teal:st==='done'?C.ivy:C.bdrX}`,
      transition:'all 200ms ease'}}>
      <span style={{fontFamily:FF.mono,fontSize:11,color:stateColor[st]||C.inkD,
        textShadow:st==='running'?textGlow(C.teal):st==='done'?textGlow(C.ivy):'none',
        minWidth:30}}>{stateSymbol[st]||'[ ]'}</span>
      <span style={{fontFamily:FF.mono,fontSize:11,color:st==='running'?C.tealB:st==='done'?C.inkS:C.inkM,
        letterSpacing:'0.08em'}}>{label}</span>
      {st==='running'&&<span className="blink" style={{color:C.teal,fontFamily:FF.mono,fontSize:11}}>_</span>}
    </div>
  );
};

// ── LEFT PANEL ───────────────────────────────────────────────
const LeftPanel=({view,steps,repo,status,subStatus,activeActivity,msgCount,deepResearch})=>{
  const statusMap={idle:'IDLE',accessing:'ACCESSING',analyzing:'ANALYZING',chatting:'CHATTING',access_error:'ERR:ACCESS',analysis_error:'ERR:ANALYSIS'};
  const statusColor={chatting:C.ivy,analyzing:C.teal,accessing:C.blue}[status]||C.inkM;
  const isActive=['analyzing','accessing'].includes(status)||['agent_thinking','agent_streaming'].includes(subStatus);

  return (
    <div style={{height:'100%',display:'flex',flexDirection:'column',background:C.bgP,
      borderRight:`1px solid ${C.bdrX}`,overflow:'hidden'}}>
      <div style={{flex:1,overflowY:'auto',padding:'12px 10px',display:'flex',flexDirection:'column',gap:8}}>

        <div style={{padding:'8px 0 10px',borderBottom:`1px solid ${C.bdrX}`,marginBottom:2}}>
          <div style={{fontFamily:FF.px,fontSize:9,color:C.teal,textShadow:textGlow(C.teal),letterSpacing:'0.1em',marginBottom:6}}>
            REPO TUTOR
          </div>
          <div style={{fontFamily:FF.mono,fontSize:10,color:C.inkM,letterSpacing:'0.16em'}}>
            // 阅读间 · AGENT SYS · v3
          </div>
        </div>

        <PxBox accent={isActive} glow={isActive} style={{padding:'8px 10px',display:'flex',flexDirection:'column',gap:6}}>
          <PxLabel>SESSION STATUS</PxLabel>
          <div style={{display:'flex',alignItems:'center',gap:8}}>
            <div style={{width:8,height:8,background:statusColor,
              boxShadow:glow(statusColor,6),
              animation:isActive?'pulse 1.4s ease-out infinite':'none'}}/>
            <span style={{fontFamily:FF.mono,fontSize:12,color:statusColor,
              textShadow:textGlow(statusColor),letterSpacing:'0.1em'}}>
              {statusMap[status]||(status||'').toUpperCase()}
            </span>
          </div>
          {subStatus&&(
            <div style={{fontFamily:FF.mono,fontSize:10,color:C.blueB,paddingLeft:16,letterSpacing:'0.06em'}}>
              → {String(subStatus).replace(/_/g,' ').toUpperCase()}
            </div>
          )}
          {repo&&<>
            <div style={{height:1,background:C.bdrX,margin:'2px 0'}}/>
            <PxLabel>REPOSITORY</PxLabel>
            <div style={{fontFamily:FF.mono,fontSize:11,color:C.tealB,wordBreak:'break-all',letterSpacing:'0.04em'}}>
              {repo.display&&repo.display.length>34?'…'+repo.display.slice(-32):(repo.display||'')}
            </div>
            <div style={{display:'flex',gap:6,flexWrap:'wrap'}}>
              {[repo.primary_language, repo.repo_size_level].filter(Boolean).map(t=>(
                <span key={t} style={{fontFamily:FF.mono,fontSize:9,padding:'2px 6px',border:`1px solid ${C.bdrX}`,color:C.inkM,letterSpacing:'0.08em'}}>{String(t).toUpperCase()}</span>
              ))}
            </div>
          </>}
        </PxBox>

        {(view==='analyzing'||view==='chatting')&&steps.length>0&&(
          <PxBox style={{padding:'8px 10px',display:'flex',flexDirection:'column',gap:4}}>
            <PxLabel style={{marginBottom:4}}>ANALYSIS PIPELINE</PxLabel>
            {steps.map(s=><StepRow key={s.step_key} step={s}/>)}
          </PxBox>
        )}

        {view==='chatting'&&(
          <PxBox style={{padding:'8px 10px',display:'flex',flexDirection:'column',gap:7}}>
            <PxLabel>TEACHING STATE</PxLabel>
            <div style={{fontFamily:FF.mono,fontSize:10,color:C.inkM,borderTop:`1px solid ${C.bdrX}`,paddingTop:6}}>
              MSG COUNT: {msgCount}
            </div>
          </PxBox>
        )}

        {deepResearch&&(
          <PxBox style={{padding:'8px 10px',display:'flex',flexDirection:'column',gap:5}}>
            <PxLabel>DEEP RESEARCH</PxLabel>
            <div style={{fontFamily:FF.mono,fontSize:10,color:C.inkS}}>
              PHASE: {String(deepResearch.phase||'?').toUpperCase()}
            </div>
            <div style={{fontFamily:FF.mono,fontSize:10,color:C.inkM}}>
              {deepResearch.completed_files}/{deepResearch.total_files} files · {(deepResearch.coverage_ratio*100).toFixed(0)}%
            </div>
            {deepResearch.current_target&&(
              <div style={{fontFamily:FF.mono,fontSize:9,color:C.blueB,wordBreak:'break-all'}}>
                ▸ {deepResearch.current_target}
              </div>
            )}
          </PxBox>
        )}

        {isActive&&(
          <PxBox accent glow style={{padding:'10px 10px',display:'flex',flexDirection:'column',gap:5}}>
            <div style={{display:'flex',gap:6,alignItems:'center'}}>
              <PxLabel color={C.teal}>AGENT ACTIVITY</PxLabel>
              <span className="blink" style={{color:C.teal,fontFamily:FF.mono,fontSize:11}}>█</span>
            </div>
            <div style={{fontFamily:FF.mono,fontSize:11,color:C.tealB,lineHeight:1.6}}>
              {activeActivity?('> '+(activeActivity.summary||'WORKING...')):
               subStatus==='agent_thinking'?'> BUILDING PROMPT CONTEXT...':
               subStatus==='agent_streaming'?'> STREAMING OUTPUT...':
               '> SCANNING FILE TREE...'}
            </div>
            {activeActivity&&activeActivity.tool_name&&(
              <div style={{fontFamily:FF.mono,fontSize:9,color:C.inkM,letterSpacing:'0.08em'}}>
                {activeActivity.phase}::{activeActivity.tool_name}
              </div>
            )}
          </PxBox>
        )}

      </div>
    </div>
  );
};

// ── CENTER PANEL ─────────────────────────────────────────────
const CenterPanel=({view,steps,repoInput,setRepoInput,analysisMode,setAnalysisMode,onSubmit,onSend,messages,inputDisabled,streaming,analysisStream,activeError})=>{
  const threadRef=useRef(null);
  useEffect(()=>{if(threadRef.current)threadRef.current.scrollTop=threadRef.current.scrollHeight;},[messages,streaming]);

  if(view==='input') return (
    <div style={{flex:1,overflowY:'auto',padding:'5vh 48px 48px',display:'flex',flexDirection:'column',gap:28,maxWidth:740,margin:'0 auto',width:'100%'}}>

      <div>
        <pre style={{fontFamily:FF.mono,fontSize:9,color:C.tealD,lineHeight:1.4,marginBottom:16,letterSpacing:'0.06em',userSelect:'none'}}>
{`╔══════════════════════════════════════╗
║  REPO TUTOR  //  SOURCE CODE READER  ║
║  VERSION 3.0.0  //  LIVE BACKEND     ║
╚══════════════════════════════════════╝`}
        </pre>
        <div style={{fontFamily:FF.mono,fontSize:13,color:C.inkS,maxWidth:'52ch',lineHeight:1.8}}>
          粘贴本地路径或 GitHub 公开仓库 URL。<br/>
          <span style={{color:C.inkM}}>// 我会先观察骨架，再陪你逐层走进去。</span>
        </div>
      </div>

      <PxBox glow style={{padding:'18px 20px',display:'flex',flexDirection:'column',gap:12}}>
        <PxLabel color={C.teal}>INPUT REPOSITORY</PxLabel>
        <form onSubmit={onSubmit} style={{display:'flex',flexDirection:'column',gap:10}}>
          <div style={{display:'flex',gap:0,border:`1px solid ${C.bdrX}`,background:C.bgD}}>
            <span style={{fontFamily:FF.mono,fontSize:13,color:C.teal,padding:'10px 10px',borderRight:`1px solid ${C.bdrX}`,userSelect:'none',textShadow:textGlow(C.teal)}}>▶</span>
            <input value={repoInput} onChange={e=>setRepoInput(e.target.value)}
              placeholder="C:\path\to\repo  |  https://github.com/owner/repo"
              style={{flex:1,background:'transparent',border:0,outline:0,fontFamily:FF.mono,fontSize:13,color:C.tealB,padding:'10px 12px',caretColor:C.teal}}
              spellCheck={false}/>
          </div>
          <div style={{display:'flex',alignItems:'center',gap:16}}>
            <div style={{display:'flex',gap:14}}>
              {[['quick_guide','Quick guide'],['deep_research','Deep research']].map(([val,label])=>(
                <label key={val} style={{display:'flex',alignItems:'center',gap:7,fontFamily:FF.mono,fontSize:11,color:C.inkS,cursor:'pointer',letterSpacing:'0.06em'}}>
                  <input type="radio" name="mode" value={val} checked={analysisMode===val}
                    onChange={e=>setAnalysisMode(e.target.value)} style={{accentColor:C.teal}}/>
                  {label.toUpperCase()}
                </label>
              ))}
            </div>
            <PxBtn type="submit" style={{marginLeft:'auto'}}>START →</PxBtn>
          </div>
        </form>
        <div style={{fontFamily:FF.mono,fontSize:10,color:C.inkD,borderTop:`1px solid ${C.bdrX}`,paddingTop:8,lineHeight:1.6}}>
          // Python repos: full teaching mode<br/>
          // Other languages: file-tree overview
        </div>
      </PxBox>

      {activeError&&(
        <PxBox style={{padding:'12px 14px',borderColor:C.rust,display:'flex',flexDirection:'column',gap:6}}>
          <PxLabel color={C.rust}>ERROR · {activeError.error_code}</PxLabel>
          <div style={{fontFamily:FF.mono,fontSize:12,color:C.rust,lineHeight:1.6}}>
            {activeError.message}
          </div>
        </PxBox>
      )}

      <div style={{display:'flex',flexDirection:'column',gap:6}}>
        <PxLabel>EXAMPLES</PxLabel>
        {['https://github.com/pallets/flask','https://github.com/tiangolo/fastapi','C:\\Users\\you\\projects\\demo'].map(ex=>(
          <div key={ex} onClick={()=>setRepoInput(ex)} style={{fontFamily:FF.mono,fontSize:11,color:C.inkM,padding:'5px 10px',border:`1px solid ${C.bdrX}`,cursor:'pointer',transition:'all 150ms ease',background:C.bgD,letterSpacing:'0.04em'}}
            onMouseEnter={e=>{e.currentTarget.style.borderColor=C.teal;e.currentTarget.style.color=C.tealB;e.currentTarget.style.background=C.tealV;}}
            onMouseLeave={e=>{e.currentTarget.style.borderColor=C.bdrX;e.currentTarget.style.color=C.inkM;e.currentTarget.style.background=C.bgD;}}>
            {'>'} {ex}
          </div>
        ))}
      </div>
    </div>
  );

  if(view==='analyzing') return (
    <div style={{flex:1,overflowY:'auto',padding:'24px 48px'}}>
      <PxBox glow style={{maxWidth:680,margin:'0 auto',padding:'24px 24px 20px',display:'flex',flexDirection:'column',gap:16}}>
        <div>
          <div className="glow-text" style={{fontFamily:FF.px,fontSize:10,color:C.teal,letterSpacing:'0.12em',marginBottom:8}}>ANALYZING</div>
          <div style={{fontFamily:FF.mono,fontSize:15,color:C.tealB,wordBreak:'break-all',letterSpacing:'0.04em'}}>{repoInput||'owner/repo'}</div>
          <div style={{fontFamily:FF.mono,fontSize:10,color:C.inkM,marginTop:4}}>// mode: {analysisMode.replace('_',' ')}</div>
        </div>
        <div style={{height:1,background:`linear-gradient(90deg,${C.teal},transparent)`,boxShadow:glow(C.teal,4)}}/>
        <div style={{display:'flex',flexDirection:'column',gap:3}}>
          {steps.map(s=>{
            const st = s.step_state || 'pending';
            const label = STEP_LABELS[s.step_key] || (s.step_key||'').toUpperCase();
            return (
              <div key={s.step_key} style={{display:'flex',alignItems:'center',gap:10,padding:'9px 12px',
                background:st==='running'?C.tealV:st==='done'?'rgba(0,204,136,0.04)':'transparent',
                borderLeft:`2px solid ${st==='running'?C.teal:st==='done'?C.ivy:st==='error'?C.rust:C.bdrX}`,
                transition:'all 200ms ease'}}>
                <span style={{fontFamily:FF.mono,fontSize:12,color:st==='running'?C.teal:st==='done'?C.ivy:st==='error'?C.rust:C.inkD,
                  textShadow:st==='running'?textGlow(C.teal):st==='done'?textGlow(C.ivy):'none',width:24}}>
                  {st==='done'?'[✓]':st==='running'?'[>]':st==='error'?'[!]':'[ ]'}
                </span>

const PxBtn=({children,onClick,type='button',style={}})=>(
  <button type={type} onClick={onClick}
    style={{background:C.tealD,border:`1px solid ${C.teal}`,color:C.bgD,
      fontFamily:FF.mono,fontSize:11,padding:'8px 16px',cursor:'pointer',
      letterSpacing:'0.1em',textTransform:'uppercase',
      boxShadow:glow(C.teal,6),transition:'all 150ms ease',...style}}
    onMouseEnter={e=>{e.currentTarget.style.background=C.teal;e.currentTarget.style.boxShadow=glow(C.teal,12);}}
    onMouseLeave={e=>{e.currentTarget.style.background=C.tealD;e.currentTarget.style.boxShadow=glow(C.teal,6);}}>
    {children}
  </button>
);

const PixelComposer=({onSend,disabled})=>{
  const [val,setVal]=useState('');
  const submit=e=>{e.preventDefault();if(val.trim()&&!disabled){onSend(val.trim());setVal('');}};
  return (
    <form onSubmit={submit} style={{display:'flex',gap:8,alignItems:'flex-end'}}>
      <div style={{flex:1,border:`1px solid ${disabled?C.bdrX:C.teal}`,background:C.bgD,display:'flex',
        boxShadow:disabled?'none':glow(C.teal,4),transition:'all 200ms ease'}}>
        <span style={{fontFamily:FF.mono,fontSize:12,color:disabled?C.inkD:C.teal,padding:'10px 10px',borderRight:`1px solid ${C.bdrX}`,userSelect:'none'}}>
          {disabled?'░':'▶'}
        </span>
        <textarea value={val} onChange={e=>setVal(e.target.value)} disabled={disabled} rows={1}
          placeholder={disabled?'// AGENT IS THINKING...':'// 输入你的问题，或点击上方建议…'}
          onKeyDown={e=>{if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();submit(e);}}}
          style={{flex:1,background:'transparent',border:0,outline:0,resize:'none',
            fontFamily:FF.mono,color:disabled?C.inkD:C.tealB,fontSize:13,
            padding:'9px 12px',maxHeight:140,lineHeight:1.6,caretColor:C.teal}}/>
      </div>
      <button type="submit" disabled={!val.trim()||disabled}
        style={{background:val.trim()&&!disabled?C.teal:C.bgR,border:`1px solid ${val.trim()&&!disabled?C.teal:C.bdrX}`,
          color:val.trim()&&!disabled?C.bgD:C.inkD,padding:'10px 14px',cursor:val.trim()&&!disabled?'pointer':'not-allowed',
          fontFamily:FF.mono,fontSize:12,letterSpacing:'0.1em',
          boxShadow:val.trim()&&!disabled?glow(C.teal,6):'none',transition:'all 150ms ease'}}>
        SEND
      </button>
    </form>
  );
};

const RightPanel=({view,messages,addLog})=>{
  const [term,setTerm]=useState('');

  const [loading,setLoading]=useState(false);
  const [errMsg,setErrMsg]=useState('');

  const askTerm=async(e)=>{
    e.preventDefault();
    if(!term.trim())return;
    setLoading(true);setAnswer('');setErrMsg('');
    addLog('info','api','POST /api/sidecar/explain');
    try{
      const resp = await api.explainSidecar(term.trim());
      setAnswer(resp.data && resp.data.answer ? resp.data.answer : '// (no answer)');
    }catch(err){
      setErrMsg((err.payload&&err.payload.message)||err.message||'EXPLAIN FAILED');
      addLog('error','api','sidecar/explain failed: '+(err.message||'?'));
    }
    setLoading(false);
  };

  const lastAgent = messages.filter(m=>m.role==='agent'&&m.streaming_complete).slice(-1)[0];
  const evidenceRefs = (() => {

      (ir.overview?.evidence_refs||[]).forEach(r=>refs.add(r));

    return Array.from(refs).slice(0,6);
  })();

  const suggestions = lastAgent && lastAgent.suggestions ? lastAgent.suggestions : [];

  return (

          <form onSubmit={askTerm} style={{display:'flex',flexDirection:'column',gap:8}}>
            <div style={{border:`1px solid ${C.bdrX}`,background:C.bgD,display:'flex'}}>
              <span style={{fontFamily:FF.mono,fontSize:11,color:C.teal,padding:'8px 8px',borderRight:`1px solid ${C.bdrX}`,userSelect:'none'}}>?</span>
              <textarea value={term} onChange={e=>setTerm(e.target.value)} rows={2} placeholder="DTO, SSE, session_id..."
                style={{flex:1,background:'transparent',border:0,outline:0,resize:'none',fontFamily:FF.mono,fontSize:12,color:C.tealB,padding:'8px 10px',lineHeight:1.6,caretColor:C.teal}}/>
            </div>
            <PxBtn type="submit" style={{alignSelf:'stretch',justifyContent:'center',textAlign:'center'}}>

            <div style={{border:`1px solid ${errMsg?C.rust:C.bdrA}`,background:C.bgD,padding:'10px 12px',boxShadow:errMsg?'none':`0 0 8px ${C.tealG}`}}>

// ── DEBUG LOG (draggable) ────────────────────────────────────
const DebugOverlay=({logs,onClear})=>{
  const [open,setOpen]=useState(false);
  const [pos,setPos]=useState({x:window.innerWidth-424,y:10});
  const listRef=useRef(null);
  const panelRef=useRef(null);
  const dragging=useRef(false);
  const dragOffset=useRef({x:0,y:0});

  useEffect(()=>{if(open&&listRef.current)listRef.current.scrollTop=listRef.current.scrollHeight;},[logs,open]);

  const onMouseDown=useCallback(e=>{
    if(e.target.closest('[data-no-drag]'))return;
    dragging.current=true;
    dragOffset.current={x:e.clientX-pos.x,y:e.clientY-pos.y};
    e.preventDefault();
    const move=ev=>{
      if(!dragging.current)return;
      const nx=ev.clientX-dragOffset.current.x;
      const ny=ev.clientY-dragOffset.current.y;
      const maxX=window.innerWidth-(panelRef.current?.offsetWidth||400);
      const maxY=window.innerHeight-(panelRef.current?.offsetHeight||48);
      setPos({x:Math.max(0,Math.min(maxX,nx)),y:Math.max(0,Math.min(maxY,ny))});
    };
    const up=()=>{dragging.current=false;window.removeEventListener('mousemove',move);window.removeEventListener('mouseup',up);};
    window.addEventListener('mousemove',move);
    window.addEventListener('mouseup',up);
  },[pos]);

  const errors=logs.filter(l=>l.level==='error').length;
  return (
    <div ref={panelRef} onMouseDown={onMouseDown}
      style={{position:'fixed',left:pos.x,top:pos.y,zIndex:1000,
        width:400,userSelect:'none',cursor:'grab',
        filter:`drop-shadow(0 0 8px ${C.tealG})`}}>
      <div style={{display:'flex',alignItems:'center',gap:7,
        padding:'5px 12px',background:C.bgE,border:`1px solid ${open?C.teal:C.bdrX}`,
        borderBottom:open?`1px solid ${C.bdrX}`:'none',
        boxShadow:open?glow(C.teal,4):'none',transition:'border-color 200ms ease'}}>
        <span style={{width:7,height:7,background:errors>0?C.rust:logs.length>0?C.teal:C.inkD,
          flexShrink:0,display:'block',animation:errors>0?'pulse 1.4s ease-out infinite':'none'}}/>
        <span style={{fontFamily:FF.mono,fontSize:10,color:C.inkS,letterSpacing:'0.12em',flex:1}}>DEBUG LOG</span>
        <span style={{fontFamily:FF.mono,fontSize:9,color:C.inkM,padding:'1px 5px',
          border:`1px solid ${C.bdrX}`,background:C.bgD}}>{logs.length}</span>
        <span style={{fontFamily:FF.mono,fontSize:8,color:C.inkD,letterSpacing:'0.06em',padding:'0 4px'}}>⠿</span>
        <button data-no-drag onClick={()=>setOpen(o=>!o)}
          style={{background:'transparent',border:`1px solid ${C.bdrX}`,color:C.inkM,
            fontFamily:FF.mono,fontSize:9,padding:'2px 6px',cursor:'pointer',lineHeight:1,
            transition:'all 150ms ease'}}
          onMouseEnter={e=>{e.target.style.borderColor=C.teal;e.target.style.color=C.tealB;}}
          onMouseLeave={e=>{e.target.style.borderColor=C.bdrX;e.target.style.color=C.inkM;}}>
          {open?'▲':'▼'}
        </button>
      </div>
      {open&&(
        <div data-no-drag style={{background:C.bgD,border:`1px solid ${C.teal}`,borderTop:0,
          boxShadow:`0 16px 40px -8px rgba(0,0,0,0.9),0 0 20px ${C.tealG}`,overflow:'hidden',cursor:'default'}}>
          <div style={{display:'flex',gap:6,padding:'6px 10px',borderBottom:`1px solid ${C.bdrX}`,background:C.bgE}}>
            <button data-no-drag onClick={onClear} style={{background:'transparent',border:`1px solid ${C.bdrX}`,color:C.inkM,fontSize:10,padding:'2px 8px',fontFamily:FF.mono,cursor:'pointer',letterSpacing:'0.08em'}}>CLEAR</button>
            <button data-no-drag onClick={()=>navigator.clipboard?.writeText(logs.map(l=>`[${l.t}][${l.level.toUpperCase()}][${l.src}] ${l.msg}`).join('\n'))}
              style={{background:'transparent',border:`1px solid ${C.bdrX}`,color:C.inkM,fontSize:10,padding:'2px 8px',fontFamily:FF.mono,cursor:'pointer',letterSpacing:'0.08em'}}>COPY ALL</button>
            <span style={{marginLeft:'auto',fontFamily:FF.mono,fontSize:9,color:C.inkD,alignSelf:'center'}}>// DEBUG CONSOLE</span>
          </div>
          <ul ref={listRef} style={{listStyle:'none',maxHeight:280,overflowY:'auto'}}>
            {logs.length===0&&<li style={{padding:'12px 10px',color:C.inkD,fontFamily:FF.mono,fontSize:11,fontStyle:'italic'}}>// no logs yet</li>}
            {logs.map(l=>(
              <li key={l.id} style={{borderBottom:`1px solid ${C.bdrX}`,padding:'6px 10px'}}>
                <div style={{display:'flex',gap:6,marginBottom:3,fontFamily:FF.mono,fontSize:9}}>
                  <span style={{color:C.inkD}}>{l.t}</span>
                  <span style={{color:{error:C.rust,warn:C.amber,info:C.teal,debug:C.blue}[l.level]||C.inkM,textShadow:textGlow({error:C.rust,warn:C.amber,info:C.teal,debug:C.blue}[l.level]||C.inkM)}}>{l.level.toUpperCase()}</span>
                  <span style={{color:C.blueB}}>{l.src}</span>
                </div>
                <div style={{color:C.inkS,fontFamily:FF.mono,fontSize:11,whiteSpace:'pre-wrap',wordBreak:'break-word',lineHeight:1.6}}>{l.msg}</div>
              </li>
            ))}
          </ul>
        </div>
      )}
    </div>
  );
};

// ── DRAG DIVIDER ─────────────────────────────────────────────
const Divider=({onDrag})=>{
  const dragging=useRef(false);
  const onMouseDown=useCallback(e=>{
    dragging.current=true;e.preventDefault();
    const move=ev=>{if(dragging.current)onDrag(ev.movementX);};
    const up=()=>{dragging.current=false;window.removeEventListener('mousemove',move);window.removeEventListener('mouseup',up);};
    window.addEventListener('mousemove',move);window.addEventListener('mouseup',up);
  },[onDrag]);
  return (
    <div onMouseDown={onMouseDown} style={{width:5,cursor:'col-resize',background:'transparent',flexShrink:0,position:'relative',zIndex:10,transition:'background 200ms ease'}}
      onMouseEnter={e=>e.currentTarget.style.background=C.tealV}
      onMouseLeave={e=>e.currentTarget.style.background='transparent'}>
      <div style={{position:'absolute',top:0,bottom:0,left:'50%',width:1,
        background:`repeating-linear-gradient(180deg,${C.bdrX} 0px,${C.bdrX} 4px,transparent 4px,transparent 8px)`}}/>
    </div>
  );
};

  const [rightW,setRightW]=useState(264);

  const sseCloseRef = useRef(null);

  const addLog=useCallback((level,src,msg)=>setLogs(l=>[...l,mkLog(level,src,msg)]),[]);

  const closeStream = useCallback(()=>{
    if (sseCloseRef.current) { sseCloseRef.current(); sseCloseRef.current=null; }
  },[]);

  // unified SSE event router
  const handleSseEvent = useCallback((name, event) => {
    switch(name){
      case "status_changed":
        setStatus(event.status);
        setSubStatus(event.sub_status||null);
        setView(VIEW_MAP[event.view]||event.view||'input');
        addLog('info','sse',`status_changed → ${event.status}${event.sub_status?'/'+event.sub_status:''}`);
        return;
      case "analysis_progress":
        if (Array.isArray(event.progress_steps) && event.progress_steps.length) {
          setSteps(event.progress_steps);
        } else {
          setSteps(prev=>{
            const idx = prev.findIndex(s=>s.step_key===event.step_key);
            if (idx<0) return [...prev,{step_key:event.step_key,step_state:event.step_state}];
            const next=prev.slice();
            next[idx]={...next[idx],step_state:event.step_state};
            return next;
          });
        }
        if (event.deep_research_state) setDeepResearch(event.deep_research_state);
        addLog('info','sse',`analysis_progress: ${event.step_key} → ${event.step_state}`);
        return;
      case "degradation_notice":
        addLog('warn','sse',`degradation: ${event.degradation.type} — ${event.degradation.user_notice}`);
        return;
      case "agent_activity":
        setActiveActivity(event.activity);
        if (event.activity.phase) addLog('debug','agent',`${event.activity.phase}: ${event.activity.summary||''}`);
        return;
      case "answer_stream_start":{
        const now=new Date().toLocaleTimeString('zh',{hour:'2-digit',minute:'2-digit'});
        const stubMsg = {
          message_id: event.message_id,
          role: 'agent',
          message_type: event.message_type,
          raw_text: '',
          suggestions: [],
          streaming_complete: false,
          time: now,
        };
        setMessages(m=>{
          const idx = m.findIndex(x=>x.message_id===event.message_id);
          if (idx>=0){ const n=m.slice(); n[idx]={...n[idx],...stubMsg}; return n; }
          return [...m, stubMsg];
        });
        setStreaming(false);
        setSubStatus('agent_streaming');
        if (event.message_type==='initial_report') setAnalysisStream('');
        return;
      }
      case "answer_stream_delta":{
        const delta = event.delta_text || '';
        setMessages(m=>m.map(x=>x.message_id===event.message_id?{...x,raw_text:(x.raw_text||'')+delta}:x));
        // mirror initial-report stream into the analyzing view textbox
        setMessages(m=>{
          const found = m.find(x=>x.message_id===event.message_id);
          if (found && found.message_type==='initial_report') {
            setAnalysisStream(s=>s+delta);
          }
          return m;
        });
        return;
      }
      case "answer_stream_end":
        return;
      case "message_completed":{
        const now=new Date().toLocaleTimeString('zh',{hour:'2-digit',minute:'2-digit'});
        const full = { ...event.message, time: now };
        setMessages(m=>{
          const idx = m.findIndex(x=>x.message_id===full.message_id);
          if (idx>=0){ const n=m.slice(); n[idx]={...n[idx],...full,streaming_complete:true}; return n; }
          return [...m,{...full,streaming_complete:true}];
        });
        setStatus(event.status);
        setSubStatus(event.sub_status||null);
        setView(VIEW_MAP[event.view]||event.view||'chatting');
        setActiveActivity(null);
        setActiveError(null);
        setInputDisabled(false);
        setStreaming(false);
        setAnalysisStream('');
        addLog('info','sse',`message_completed: ${event.message.message_type}`);
        return;
      }
      case "error":
        setActiveError(event.error);
        setStatus(event.status);
        setSubStatus(event.sub_status||null);
        setView(VIEW_MAP[event.view]||event.view||'input');
        setStreaming(false);
        setInputDisabled(false);
        setActiveActivity(null);
        addLog('error','sse',`${event.error.error_code}: ${event.error.message}`);
        return;
      default:
        addLog('debug','sse',`unhandled event: ${name}`);
    }
  },[addLog]);

  // boot: restore existing session if any
  useEffect(()=>{
    let cancelled=false;
    (async()=>{
      try{
        const resp = await api.getSession();
        if (cancelled) return;
        const snap = resp.data;
        if (snap.session_id) {
          setSessionId(snap.session_id);
          setStatus(snap.status);
          setSubStatus(snap.sub_status||null);
          setView(VIEW_MAP[snap.view]||'input');
          setSteps(snap.progress_steps||[]);
          setMessages((snap.messages||[]).map(m=>({...m,streaming_complete:true,time:new Date(m.created_at||Date.now()).toLocaleTimeString('zh',{hour:'2-digit',minute:'2-digit'})})));
          if (snap.repository) {
            setRepoInput(snap.repository.input_value||'');
            setRepoSummary({
              display: snap.repository.display_name||snap.repository.input_value,
              primary_language: snap.repository.primary_language,
              repo_size_level: snap.repository.repo_size_level,
            });
          }
          if (snap.analysis_mode) setAnalysisMode(snap.analysis_mode);
          if (snap.deep_research_state) setDeepResearch(snap.deep_research_state);
          if (snap.active_error) setActiveError(snap.active_error);
          addLog('info','boot',`restored session ${snap.session_id} (${snap.status})`);
        } else {
          addLog('info','boot','no active session; starting fresh');
        }
      }catch(err){
        if (!cancelled) addLog('warn','boot','GET /api/session failed: '+(err.message||'?'));
      }
    })();
    return ()=>{ cancelled=true; closeStream(); };
  },[addLog,closeStream]);

  const onSubmit=useCallback(async e=>{
    e.preventDefault();
    if(!repoInput.trim())return;
    addLog('info','ui','SUBMIT: '+repoInput+' ['+analysisMode+']');
    setActiveError(null);
    setSteps([]);
    setAnalysisStream('');
    setDeepResearch(null);
    setMessages([]);
    setView('analyzing');
    setStatus('accessing');
    setInputDisabled(true);
    try{
      const resp = await api.submitRepo(repoInput.trim(), analysisMode);
      const sid = resp.session_id;
      setSessionId(sid);
      if (resp.data && resp.data.repository) {
        setRepoSummary({
          display: resp.data.repository.display_name||resp.data.repository.input_value,
          primary_language: resp.data.repository.primary_language,
          repo_size_level: resp.data.repository.repo_size_level,
        });
      }
      addLog('info','api',`POST /api/repo → 202 (session ${sid})`);
      closeStream();
      addLog('debug','sse',`CONNECT /api/analysis/stream?session_id=${sid}`);
      sseCloseRef.current = openStream('analysis', sid,
        (name,ev)=>handleSseEvent(name,ev),
        (state)=>addLog(state===2?'info':'warn','sse',`analysis stream state=${state}`));
    }catch(err){
      const p = err.payload || { error_code:'unknown', message: err.message||'submit failed' };
      setActiveError(p);
      setStatus('access_error');
      setView('input');
      setInputDisabled(false);
      addLog('error','api','POST /api/repo failed: '+p.message);
    }
  },[repoInput,analysisMode,addLog,handleSseEvent,closeStream]);

  const onSend=useCallback(async(text)=>{
    if(inputDisabled||!sessionId)return;
    const now=new Date().toLocaleTimeString('zh',{hour:'2-digit',minute:'2-digit'});
    setActiveError(null);
    setMessages(m=>[...m,{
      message_id:`u_${Date.now()}`,
      role:'user',
      raw_text:text,
      streaming_complete:true,
      time:now,
    }]);
    setInputDisabled(true);
    setSubStatus('agent_thinking');
    setStreaming(true);
    addLog('info','api',`POST /api/chat (session ${sessionId})`);
    try{
      await api.sendMessage(sessionId, text);
    }catch(err){
      const p = err.payload || { error_code:'unknown', message: err.message||'send failed' };
      setActiveError(p);
      setInputDisabled(false);
      setStreaming(false);
      setSubStatus('waiting_user');
      addLog('error','api','POST /api/chat failed: '+p.message);
      return;
    }
    closeStream();
    addLog('debug','sse',`CONNECT /api/chat/stream?session_id=${sessionId}`);
    sseCloseRef.current = openStream('chat', sessionId,
      (name,ev)=>handleSseEvent(name,ev),
      (state)=>addLog(state===2?'info':'warn','sse',`chat stream state=${state}`));
  },[inputDisabled,sessionId,addLog,handleSseEvent,closeStream]);

  const onReset=useCallback(async()=>{
    addLog('info','ui','RESET session');
    closeStream();
    if (sessionId) {
      try{
        await api.clearSession(sessionId);
        addLog('info','api',`DELETE /api/session (${sessionId})`);
      }catch(err){
        addLog('warn','api','DELETE /api/session failed: '+(err.message||'?'));
      }
    }
    setSessionId(null);
    setRepoSummary(null);
    setView('input');
    setStatus('idle');
    setSubStatus(null);
    setMessages([]);
    setSteps([]);
    setAnalysisStream('');
    setActiveActivity(null);
    setActiveError(null);
    setDeepResearch(null);
    setInputDisabled(false);
    setStreaming(false);
  },[sessionId,addLog,closeStream]);

  const leftRepoInfo = repoSummary ? repoSummary : (repoInput ? {display:repoInput} : null);

  return (
    <div style={{width:'100vw',height:'100vh',display:'flex',flexDirection:'column',overflow:'hidden',
      background:C.bg,position:'relative'}}>

      {tweaks.scanlines&&<div style={{position:'fixed',inset:0,zIndex:9998,pointerEvents:'none',
        background:'repeating-linear-gradient(0deg,rgba(0,0,0,0.15) 0px,rgba(0,0,0,0.15) 1px,transparent 1px,transparent 3px)'}}/>}

      <div style={{flex:1,display:'flex',minHeight:0,position:'relative'}}>

        {tweaks.showLeftPanel&&<>
          <div style={{width:leftW,minWidth:160,maxWidth:400,flexShrink:0}}>
            <LeftPanel view={view} steps={steps} repo={view!=='input'?leftRepoInfo:null}
              status={status} subStatus={subStatus} activeActivity={activeActivity}
              msgCount={messages.length} deepResearch={deepResearch}/>
          </div>
          <Divider onDrag={dx=>setLeftW(w=>Math.max(160,Math.min(400,w+dx)))}/>
        </>}

        <div style={{flex:1,display:'flex',flexDirection:'column',minWidth:0,background:C.bg,overflow:'hidden'}}>
          {view==='chatting'&&<ChatHeader repo={repoSummary?.display||repoInput} onReset={onReset}/>}
          <div style={{flex:1,display:'flex',minHeight:0}}>
            <CenterPanel view={view} steps={steps} repoInput={repoInput} setRepoInput={setRepoInput}
              analysisMode={analysisMode} setAnalysisMode={setAnalysisMode}
              onSubmit={onSubmit} onSend={onSend} messages={messages}
              inputDisabled={inputDisabled} streaming={streaming}
              analysisStream={analysisStream} activeError={activeError}/>
          </div>
        </div>

        {tweaks.showRightPanel&&<>
          <Divider onDrag={dx=>setRightW(w=>Math.max(180,Math.min(420,w-dx)))}/>
          <div style={{width:rightW,minWidth:180,maxWidth:420,flexShrink:0}}>
            <RightPanel view={view} messages={messages} addLog={addLog}/>
          </div>
        </>}

      </div>

      <DebugOverlay logs={logs} onClear={()=>setLogs([])}/>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
